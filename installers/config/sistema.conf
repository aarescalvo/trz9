# ================================================================================
# CONFIGURACIÓN DEL SISTEMA FRIGORÍFICO SOLEMAR
# ================================================================================
# 
# Este archivo contiene toda la configuración del sistema.
# Modifique los valores según sus necesidades.
#
# Ubicación: C:\SolemarFrigorifico\config\sistema.conf
#
# ================================================================================

# ================================================================================
# REPOSITORIO DE ACTUALIZACIONES
# ================================================================================
# Cambie esta URL cuando quiera usar un nuevo repositorio

GITHUB_REPO_URL="https://github.com/aarescalvo/153"
GITHUB_BRANCH="master"

# Token de acceso personal (opcional, para repositorios privados)
# Generar en: GitHub > Settings > Developer settings > Personal access tokens
GITHUB_TOKEN=""

# ================================================================================
# BASE DE DATOS POSTGRESQL
# ================================================================================

DB_HOST="localhost"
DB_PORT="5432"
DB_NAME="solemar_frigorifico"
DB_USER="solemar_user"
DB_PASSWORD="Solemar2024!"

# Conexión completa (no modificar, se genera automáticamente)
DATABASE_URL="postgresql://solemar_user:Solemar2024!@localhost:5432/solemar_frigorifico?schema=public"

# ================================================================================
# SERVIDOR DE APLICACIÓN
# ================================================================================

APP_PORT="3000"
APP_HOST="0.0.0.0"
NODE_ENV="production"

# ================================================================================
# RESPALDOS AUTOMÁTICOS
# ================================================================================

# Directorio donde se guardan los respaldos
BACKUP_DIR="C:\SolemarFrigorifico\backups"

# Cantidad de respaldos a mantener (los más antiguos se eliminan)
BACKUP_KEEP_COUNT="30"

# Hora del respaldo automático (formato 24hs)
BACKUP_HOUR="02"
BACKUP_MINUTE="00"

# ================================================================================
# EMAIL SMTP
# ================================================================================

SMTP_HOST="smtp.office365.com"
SMTP_PORT="587"
SMTP_USER=""
SMTP_PASS=""
SMTP_FROM_NAME="Sistema Frigorífico Solemar"
SMTP_FROM_EMAIL=""

# ================================================================================
# NOTIFICACIONES
# ================================================================================

# Enviar email cuando haya actualizaciones disponibles
NOTIFY_UPDATE_AVAILABLE="true"

# Enviar email cuando se complete una actualización
NOTIFY_UPDATE_COMPLETED="true"

# Emails de administradores (separados por coma)
ADMIN_EMAILS=""

# ================================================================================
# LOGS
# ================================================================================

# Nivel de logging: debug, info, warn, error
LOG_LEVEL="info"

# Días a mantener los archivos de log
LOG_KEEP_DAYS="90"

# ================================================================================
# SEGURIDAD
# ================================================================================

# Tiempo de expiración de sesión en minutos
SESSION_EXPIRE_MINUTES="60"

# Intentos máximos de login antes de bloquear
MAX_LOGIN_ATTEMPTS="5"

# Tiempo de bloqueo en minutos después de intentos fallidos
LOCKOUT_DURATION_MINUTES="15"

# ================================================================================
# ACTUALIZACIONES
# ================================================================================

# Verificar actualizaciones automáticamente cada X horas
UPDATE_CHECK_INTERVAL_HOURS="24"

# Descargar actualizaciones automáticamente (false = solo notificar)
AUTO_DOWNLOAD_UPDATES="false"

# Hacer backup automático antes de actualizar
AUTO_BACKUP_BEFORE_UPDATE="true"

# ================================================================================
# INTEGRACIÓN CON SISTEMAS EXTERNOS
# ================================================================================

# API de SENASA (si aplica)
SENASA_API_URL=""
SENASA_API_KEY=""

# Sistema de facturación externo
FACTURACION_API_URL=""
FACTURACION_API_KEY=""

# ================================================================================
# IMPRESORAS
# ================================================================================

# Impresora de rótulos por defecto
DEFAULT_LABEL_PRINTER=""

# Impresora de tickets por defecto
DEFAULT_TICKET_PRINTER=""

# ================================================================================
# BALANZAS
# ================================================================================

# Puerto serie de la balanza de camiones
BALANZA_CAMION_PORT="COM1"
BALANZA_CAMION_BAUD="9600"

# Puerto serie de la balanza individual
BALANZA_INDIVIDUAL_PORT="COM2"
BALANZA_INDIVIDUAL_BAUD="9600"

# ================================================================================
# DATOS DE LA EMPRESA
# ================================================================================

EMPRESA_NOMBRE="Solemar Alimentaria"
EMPRESA_DIRECCION=""
EMPRESA_TELEFONO=""
EMPRESA_EMAIL=""
EMPRESA_CUIT=""
EMPRESA_NUMERO_ESTABLECIMIENTO=""
EMPRESA_MATRICULA=""

# ================================================================================
# FIN DE CONFIGURACIÓN
# ================================================================================
